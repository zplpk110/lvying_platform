# 旅盈后端：MyBatis + Druid 数据源
server:
  port: 8080

spring:
  application:
    name: lvying-server
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url: jdbc:mysql://localhost:3306/lvying_dev?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      validation-query: SELECT 1
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.lvying.domain,com.lvying.mapper.dto
  type-handlers-package: com.lvying.mybatis.handler
  configuration:
    map-underscore-to-camel-case: true
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler

lvying:
  jwt:
    secret: ${JWT_SECRET:lvying-dev-secret-change-me-min-32-chars-long!!}
    expiration-ms: 604800000
  reserved-safe-cash: ${RESERVED_SAFE_CASH:0}
